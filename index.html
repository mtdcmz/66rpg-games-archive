<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MTDCMZ's 66RPG Games Archive</title>
    <link rel="icon" type="image/jpeg" href="favicon.jpg">
    <style>
        /* ===== 橙色主题 · 基础重置 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
        }

        body {
            background-color: #faf8f5;
            color: #332211;
            line-height: 1.5;
            user-select: none;
            -webkit-user-select: none;
            overflow-x: hidden;
        }

        img {
            -webkit-user-drag: none;
            user-drag: none;
        }

        :root {
            --primary: #ff6600;          /* 活力橙 */
            --primary-dark: #e05e2e;
            --primary-light: #ffac28;
            --accent: #ffd280;
            --bg-card: #ffffff;
            --text-light: #ffffff;
            --shadow: 0 8px 20px rgba(255, 102, 0, 0.15);
        }

        /* ===== 导航栏 ===== */
        .navbar {
            background: linear-gradient(145deg, var(--primary), #ff8c42);
            color: white;
            padding: 0.8rem 2rem;
            box-shadow: var(--shadow);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
        }
        .logo {
            display: flex;
            align-items: center;
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-shadow: 2px 2px 0 rgba(0,0,0,0.1);
        }
        .logo-icon {
            width: 40px;
            height: 40px;
            margin-right: 12px;
            border-radius: 50%;
            background: url('data/images/icon.jpg') center/cover;
            border: 2px solid white;
        }
        .nav-links {
            display: flex;
            gap: 1.2rem;
        }
        .nav-link {
            display: flex;
            align-items: center;
            gap: 6px;
            color: white;
            text-decoration: none;
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            background: rgba(255,255,255,0.1);
            transition: 0.2s;
            font-weight: 500;
        }
        .nav-link:hover {
            background: var(--primary-dark);
        }
        .nav-link img {
            width: 20px; height: 20px;
            filter: brightness(0) invert(1);
        }
        /* ===== 主容器 ===== */
        .container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1.5rem;
        }

        .page-title {
            text-align: center;
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--primary-dark);
            margin-bottom: 2rem;
            letter-spacing: 2px;
            text-shadow: 0 2px 4px var(--accent);
        }

        /* ===== 游戏卡片网格 ===== */
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
        }

        .game-card {
            background: var(--bg-card);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(255, 102, 0, 0.2);
            transition: 0.3s;
            border: 1px solid rgba(255, 102, 0, 0.2);
        }

        .game-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 30px rgba(255, 102, 0, 0.3);
        }

        .game-thumb {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-bottom: 4px solid var(--primary);
        }

        .game-info {
            padding: 1.5rem;
        }

        .game-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--primary-dark);
            margin-bottom: 0.5rem;
        }

        .game-desc {
            color: #5a4a3a;
            font-size: 0.9rem;
            margin-bottom: 1.2rem;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .play-btn {
            display: block;
            width: 100%;
            padding: 0.8rem;
            background: var(--primary);
            color: white;
            text-align: center;
            text-decoration: none;
            border-radius: 60px;
            font-weight: 600;
            transition: 0.2s;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 0 var(--primary-dark);
        }

        .play-btn:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 6px 0 #b3471a;
        }

        /* ===== 免责模态框 (橙色风格) ===== */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            border-radius: 32px;
            max-width: 550px;
            width: 90%;
            padding: 2rem;
            box-shadow: 0 25px 40px var(--primary);
            border: 2px solid var(--primary-light);
        }

        .modal-title {
            color: var(--primary-dark);
            font-size: 2rem;
            margin-bottom: 1rem;
            font-weight: 700;
        }

        .modal-text p {
            margin: 1rem 0;
            color: #4a3c2c;
        }

        .modal-footer {
            display: flex;
            justify-content: flex-end;
            margin-top: 1.5rem;
        }

        .modal-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.8rem 2.2rem;
            border-radius: 40px;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 4px 0 var(--primary-dark);
        }

        .modal-btn:disabled {
            background: #ccc;
            box-shadow: 0 4px 0 #999;
            cursor: not-allowed;
        }

        .modal-btn:not(:disabled):hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
        }

        /* ===== 加载动画 ===== */
        .loader {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 200px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #ffe0b2;
            border-top: 5px solid var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0); }
            100% { transform: rotate(360deg); }
        }

        /* ===== 错误提示 ===== */
        .error-message {
            background: #ffede1;
            color: #b33c00;
            padding: 2rem;
            border-radius: 24px;
            text-align: center;
            border: 1px solid #ff8a5c;
        }

        .error-message button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.7rem 1.8rem;
            border-radius: 40px;
            margin-top: 1rem;
            font-weight: bold;
            cursor: pointer;
        }

        /* ===== 响应式 ===== */
        @media (max-width: 768px) {
            .navbar { padding: 0.6rem 1rem; }
            .nav-container { flex-direction: column; gap: 0.5rem; }
            .logo { font-size: 1.2rem; }
            .nav-links { flex-wrap: wrap; justify-content: center; }
            .page-title { font-size: 2rem; }
        }

        @media (max-width: 480px) {
            .games-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <div class="logo-icon"></div>
                <span>MTDCMZ's 66RPG Games Archive</span>
            </div>
            <div class="nav-links">
                <a href="index" class="nav-link">主页</a>
                <a href="https://space.bilibili.com/426046208" target="_blank" class="nav-link">
                    <img src="https://ts2.cn.mm.bing.net/th?id=ODLS.e42d2c4d-ad65-4c7a-b0fd-817a1c3bed01" alt="Bili"> Bilibili
                </a>
                <a href="https://github.com/mtdcmz" target="_blank" class="nav-link">
                    <img src="https://github.githubassets.com/assets/pinned-octocat-093da3e6fa40.svg" class="github-icon" alt="GitHub"> GitHub
                </a>
            </div>
        </div>
    </nav>

    <div class="container">
        <h1 class="page-title">橙光游戏档案馆</h1>
        <div id="games-container" class="games-grid">
            <div class="loader"><div class="spinner"></div></div>
        </div>
    </div>

    <!-- 免责模态框 (同前) -->
    <div id="disclaimer-modal" class="modal">
        <div class="modal-content">
            <h2 class="modal-title">免责声明</h2>
            <div class="modal-text">
                <p>本网站主要收集橙光游戏历史版本，仅供个人学习、研究与怀旧。</p>
                <p>所有资源均来源于网络，版权归原作者所有。若侵犯权益，请通过GitHub联系，我们会及时处理。</p>
                <p>继续使用即表示您理解并同意以上声明。</p>
            </div>
            <div class="modal-footer">
                <button id="agree-btn" class="modal-btn" disabled>同意 (10)</button>
            </div>
        </div>
    </div>

    <script>
        // 防右键 & 选择
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('selectstart', e => e.preventDefault());

        document.addEventListener('DOMContentLoaded', () => {
            const hasAgreed = localStorage.getItem('disclaimerAgreed_66rpg');
            if (!hasAgreed) showDisclaimer();
            else loadGames();

            function loadGames() {
                fetch('data/details.json')
                    .then(r => { if (!r.ok) throw new Error('网络错误'); return r.json(); })
                    .then(renderGames)
                    .catch(() => showError());
            }

            function renderGames(games) {
                const container = document.getElementById('games-container');
                container.innerHTML = '';
                if (!games.length) {
                    container.innerHTML = '<div class="error-message">暂无游戏数据</div>';
                    return;
                }
                games.forEach(game => {
                    const card = document.createElement('div');
                    card.className = 'game-card';
                    const thumbPath = `data/images/${game.id}.jpg`;
                    card.innerHTML = `
                        <img src="${thumbPath}" alt="${game.name}" class="game-thumb"
                             onerror="this.src='data:image/svg+xml,%3Csvg%20width%3D%22280%22%20height%3D%22180%22%20viewBox%3D%220%200%20280%20180%22%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%3E%3Crect%20width%3D%22280%22%20height%3D%22180%22%20fill%3D%22%23ffe0b2%22%2F%3E%3Ctext%20x%3D%22140%22%20y%3D%22100%22%20font-size%3D%2214%22%20fill%3D%22%23ff6600%22%20text-anchor%3D%22middle%22%3E暂无封面%3C%2Ftext%3E%3C%2Fsvg%3E'">
                        <div class="game-info">
                            <h3 class="game-title">${game.name}</h3>
                            <p class="game-desc">${game.desc}</p>
                            <a href="play?id=${game.id}" class="play-btn">开始游戏</a>
                        </div>
                    `;
                    container.appendChild(card);
                });
            }

            function showError() {
                document.getElementById('games-container').innerHTML = `
                    <div class="error-message">
                        <h3>加载失败</h3>
                        <p>请刷新页面重试</p>
                        <button onclick="location.reload()">重新加载</button>
                    </div>
                `;
            }

            function showDisclaimer() {
                const modal = document.getElementById('disclaimer-modal');
                const btn = document.getElementById('agree-btn');
                modal.style.display = 'flex';
                let sec = 10;
                btn.textContent = `同意 (${sec})`;
                const timer = setInterval(() => {
                    sec--;
                    btn.textContent = `同意 (${sec})`;
                    if (sec <= 0) {
                        clearInterval(timer);
                        btn.disabled = false;
                        btn.textContent = '同意并进入';
                    }
                }, 1000);
                btn.addEventListener('click', function agreeHandler() {
                    localStorage.setItem('disclaimerAgreed_66rpg', 'true');
                    modal.style.display = 'none';
                    loadGames();
                }, { once: true });
            }
        });
    </script>
</body>
</html>
